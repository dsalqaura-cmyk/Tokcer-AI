name: Deploy Tokcer AI

on:
  push:
    branches:
      - main
      - staging

jobs:
  web-deploy:
    name: 🚀 Deploy
    runs-on: ubuntu-latest
    steps:
    - name: 🚚 Get latest code
      uses: actions/checkout@v4

    - name: ⚙️ Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20
        cache: 'npm'

    - name: 🔨 Install dependencies
      run: npm ci

    - name: 🏗️ Build Project
      run: |
        if [ "${{ github.ref }}" == "refs/heads/main" ]; then
          npm run build
        else
          npx vite build --mode staging
        fi
      env:
        VITE_SUPABASE_URL: ${{ github.ref == 'refs/heads/main' && secrets.VITE_SUPABASE_URL || secrets.STAGING_VITE_SUPABASE_URL }}
        VITE_SUPABASE_ANON_KEY: ${{ github.ref == 'refs/heads/main' && secrets.VITE_SUPABASE_ANON_KEY || secrets.STAGING_VITE_SUPABASE_ANON_KEY }}
        VITE_DEEPSEEK_API_KEY: ${{ secrets.VITE_DEEPSEEK_API_KEY }}

    - name: 📂 Sync to Staging (Public)
      if: github.ref == 'refs/heads/staging'
      uses: SamKirkland/FTP-Deploy-Action@v4.3.5
      with:
        server: ${{ secrets.FTP_SERVER }}
        username: ${{ secrets.FTP_USERNAME }}
        password: ${{ secrets.FTP_PASSWORD }}
        local-dir: ./dist/
        server-dir: staging.tokcer-ai.com/

    - name: 📂 Sync to Staging (Internal Admin)
      if: github.ref == 'refs/heads/staging'
      uses: SamKirkland/FTP-Deploy-Action@v4.3.5
      with:
        server: ${{ secrets.FTP_SERVER }}
        username: ${{ secrets.FTP_USERNAME }}
        password: ${{ secrets.FTP_PASSWORD }}
        local-dir: ./dist/
        server-dir: dashboardstaging.tokcer-ai.com/

    - name: 📂 Sync to Production (Main Site)
      if: github.ref == 'refs/heads/main'
      uses: SamKirkland/FTP-Deploy-Action@v4.3.5
      with:
        server: ${{ secrets.FTP_SERVER }}
        username: ${{ secrets.FTP_USERNAME }}
        password: ${{ secrets.FTP_PASSWORD }}
        local-dir: ./dist/
        server-dir: tokcer-ai.com/
