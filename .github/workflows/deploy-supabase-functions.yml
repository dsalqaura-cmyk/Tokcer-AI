name: Deploy Supabase Functions

on:
  push:
    branches:
      - staging
    paths:
      - 'supabase/functions/**'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v3

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Deploy Functions
        run: |
          supabase functions deploy midtrans-init --project-ref "gejccutabxtyxsveczvd" --no-verify-jwt
          supabase functions deploy midtrans-webhook --project-ref "gejccutabxtyxsveczvd" --no-verify-jwt
          supabase functions deploy cron-h3-reminder --project-ref "gejccutabxtyxsveczvd" --no-verify-jwt
          supabase functions deploy ai-proxy --project-ref "gejccutabxtyxsveczvd"
          supabase functions deploy send-partner-reminder --project-ref "gejccutabxtyxsveczvd"
          supabase functions deploy tiktok-auth --project-ref "gejccutabxtyxsveczvd" --no-verify-jwt
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
