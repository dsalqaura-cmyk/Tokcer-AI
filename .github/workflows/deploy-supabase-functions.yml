name: Deploy Supabase Functions

on:
  push:
    branches:
      - staging
      - main
    paths:
      - 'supabase/functions/**'
      - '.github/workflows/deploy-supabase-functions.yml'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v3

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Set Project Reference
        id: vars
        run: |
          if [ "${{ github.ref }}" = "refs/heads/main" ]; then
            echo "project_ref=iogxyohoexfkpugdtymu" >> $GITHUB_OUTPUT
          else
            echo "project_ref=gejccutabxtyxsveczvd" >> $GITHUB_OUTPUT
          fi

      - name: Deploy Functions
        run: |
          supabase functions deploy midtrans-init --project-ref "${{ steps.vars.outputs.project_ref }}" --no-verify-jwt
          supabase functions deploy midtrans-webhook --project-ref "${{ steps.vars.outputs.project_ref }}" --no-verify-jwt
          supabase functions deploy cron-h3-reminder --project-ref "${{ steps.vars.outputs.project_ref }}" --no-verify-jwt
          supabase functions deploy ai-proxy --project-ref "${{ steps.vars.outputs.project_ref }}"
          supabase functions deploy send-partner-reminder --project-ref "${{ steps.vars.outputs.project_ref }}"
          supabase functions deploy tiktok-auth --project-ref "${{ steps.vars.outputs.project_ref }}" --no-verify-jwt
          supabase functions deploy register-starter --project-ref "${{ steps.vars.outputs.project_ref }}" --no-verify-jwt
          supabase functions deploy sync-marketplace --project-ref "${{ steps.vars.outputs.project_ref }}" --no-verify-jwt
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
